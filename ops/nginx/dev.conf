# `resolver` + `set $var ...; proxy_pass $var;` forces nginx to re-resolve
# the backend/frontend container names on each request (bounded by `valid`)
# instead of caching whatever IP they had when nginx started. Without this,
# nginx 502s every time the backend container is recreated (new IP) until
# nginx itself is restarted -- bit us in local dev, will bite in prod too.
resolver 127.0.0.11 valid=10s;

server {
    listen 80;

    # Real brand exports routinely exceed 50m (confirmed: a real Pepe
    # monthly file was 75.8m and got rejected here with a 413 -- Django
    # never even saw the request, which looked like a totally unrelated
    # upload failure until traced back to this). 500m gives real headroom
    # for growth (YTD-style cumulative exports, multi-year historical
    # backfills) without being fully unbounded. Caddy (ops/caddy/Caddyfile,
    # production) has no size cap at all by default, so this is a
    # dev-nginx-only gap, not something prod needed fixing too.
    client_max_body_size 500m;

    set $backend_upstream http://backend:8000;
    set $frontend_upstream http://frontend:5173;

    # Variable-based proxy_pass makes nginx forward the client's original
    # URI unchanged (nginx disables its usual prefix-stripping when the
    # target is a variable) -- so /api/auth/login/ reaches Django as
    # /api/auth/login/, matching core/urls.py exactly. Do not add a path
    # after the variable here; nginx ignores it.
    location /api/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /admin/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health/ {
        proxy_pass $backend_upstream;
    }

    location / {
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
