## Base services shared by every environment -- no host ports and no
## bind-mounted source here; those are dev-only conveniences that live in
## docker-compose.override.yml (auto-loaded by plain `docker compose up`)
## and must NOT leak into production, where internal services (Postgres,
## Redis, MinIO) should never be reachable from outside the compose network.
## Production-only pieces (Caddy/TLS, static frontend build, restart
## policies, worker tuning) live in docker-compose.prod.yml.
services:
  db:
    image: postgres:16
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-retail_analytics}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${OBJECT_STORAGE_ACCESS_KEY:-minioadmin} ${OBJECT_STORAGE_SECRET_KEY:-minioadmin} &&
      mc mb --ignore-existing local/${OBJECT_STORAGE_BUCKET:-retail-analytics-uploads}
      "

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  celery:
    build: ./backend
    env_file: .env
    entrypoint: []
    command: ["celery", "-A", "core", "worker", "-l", "info"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  pgdata:
  minio_data:
