## Production overlay -- run alongside the base file only, explicitly
## skipping docker-compose.override.yml's dev conveniences:
##   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
## Adds: baked (non-bind-mounted) backend/celery images, tuned gunicorn
## workers, restart policies, the static frontend build, and Caddy for
## reverse proxy + automatic TLS. No host ports on db/redis/minio -- they
## stay reachable only from other containers on the compose network.
services:
  db:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  minio:
    restart: unless-stopped

  backend:
    command:
      [
        "gunicorn",
        "core.wsgi:application",
        "--bind",
        "0.0.0.0:8000",
        "--workers",
        "${GUNICORN_WORKERS:-4}",
        "--access-logfile",
        "-",
        "--error-logfile",
        "-",
      ]
    restart: unless-stopped
    volumes:
      - static_files:/app/staticfiles

  celery:
    restart: unless-stopped

  frontend-build:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    volumes:
      - frontend_dist:/output

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./ops/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - frontend_dist:/srv/frontend:ro
      - static_files:/srv/static:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_started
      frontend-build:
        condition: service_completed_successfully

volumes:
  frontend_dist:
  static_files:
  caddy_data:
  caddy_config:
